<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tiêu điểm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#faf9f5;color:#141413;font-family:"Poppins",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#141413;text-decoration:underline;text-underline-offset:3px}
  a:hover{color:#d97757}
  input,textarea,button{font-family:inherit}
  input:focus,textarea:focus{outline:2px solid #d97757;outline-offset:1px}
  ::placeholder{color:#b0aea5}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#e0ddd0;border-radius:999px;border:3px solid #faf9f5}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes drwr{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .scrl::-webkit-scrollbar-thumb{background:#e0ddd0}
  [data-hover]:hover{filter:brightness(0.98)}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
